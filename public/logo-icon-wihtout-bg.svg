<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <defs>
    <!-- Steel Outer Gradient -->
    <linearGradient id="steelGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="100%" stop-color="#082f49" />
    </linearGradient>
    <!-- Foam Insulation Core Gradient -->
    <linearGradient id="foamGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f97316" />
      <stop offset="100%" stop-color="#eab308" />
    </linearGradient>
    <!-- Metallic Highlights -->
    <linearGradient id="metalHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#0369a1" />
    </linearGradient>
  </defs>

  <!-- Background Base (Transparent / Clean) -->
  
  <!-- The PUF Panel Concept (3-Layer Sandwich Structure) -->
  <!-- Top Profile: Trapezoidal Sheet (Ribbed) -->
  <path d="M 15,25 L 30,25 L 38,15 L 48,15 L 56,25 L 70,25 L 78,15 L 88,15" fill="none" stroke="url(#metalHighlight)" stroke-width="4.5" />
  
  <!-- Middle Foam Core (Vibrant Orange/Yellow Insulated Layer) -->
  <path d="M 15,40 L 30,40 L 38,30 L 48,30 L 56,40 L 70,40 L 78,30 L 88,30 L 88,48 L 78,48 L 70,58 L 56,58 L 48,48 L 38,48 L 30,58 L 15,58 Z" fill="url(#foamGrad)" opacity="0.9" stroke="none" />
  
  <!-- Bottom Profile: Flat/Micro-ribbed Sheet -->
  <path d="M 15,62 L 88,62" fill="none" stroke="url(#steelGrad)" stroke-width="3.5" />

  <!-- The "E" and "T" Integrated Initials in the Background/Foreground -->
  <g stroke="url(#steelGrad)" stroke-width="3" fill="none" opacity="0.8">
    <!-- Letter E representation -->
    <path d="M 22,70 L 22,88 L 42,88 M 22,79 L 34,79 M 22,70 L 42,70" />
    <!-- Letter T representation -->
    <path d="M 50,70 L 82,70 M 66,70 L 66,88" />
  </g>

  <!-- Insulating Shield/Aura Circle (Micro dots representing particles/curing) -->
  <circle cx="50" cy="50" r="45" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="3 6" opacity="0.5" />
</svg>
